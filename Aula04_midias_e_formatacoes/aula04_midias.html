<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Fotos</title>
</head>
<body>
    <header>
        <h1>Galeria de fotos:</h1>
    </header>
    <main>
        <section>
            <!-- Importando imagem local -->
            <img src="/Aula04_midias_e_formatacoes/midias/paisagem.jfif" alt="Paisagem" width="300px" height="300px">
            <br><br><br>


            <!-- Importando imagens externas -->
            <img src="https://picsum.photos/id/100/300/200" alt="imagem 01">
            <img src="https://picsum.photos/id/101/300/200" alt="imagem 02">

            <img src="https://picsum.photos/id/104/300/200" alt="imagem 05">
            <img src="https://picsum.photos/id/110/300/200" alt="imagem 06">
            <img src="https://picsum.photos/id/106/300/200" alt="imagem 07">
            <img src="https://picsum.photos/id/107/300/200" alt="imagem 08">
            <img src="https://picsum.photos/id/108/300/200" alt="imagem 09">
            <img src="https://picsum.photos/id/109/300/200" alt="imagem 10">
            <img src="/Aula04_midias_e_formatacoes/midias/laranjito.jfif" alt="laranjito">

        </section>
        <br><br><br>
        <!-- Imagem com legenda -->
        <section>
            <figure>
                <img src="/Aula04_midias_e_formatacoes/midias/grafico.jfif" alt="Grafico de crescimento anual da empresa." width="300px" height="300px">

                    Gráfico de crescimento da empresa no ano de 2025
                </figcaption>
            </figure>
        </section>
    </main>

</html>
