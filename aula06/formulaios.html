<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formularios</title>
  </head>
  <body>
    <h1>Cadastri Aluno - DSM</h1>
    <form action="#" method="POST">
      <fieldset>
        <legend>Dados Pessoais</legend>
        <label for="nome">Nome Completo</label><br />
        <input
          type="text"
          name="Nome"
          id="nome"
          required
          placeholder="Digite seu nome aqui"
        /><br />
        <label for="email">E-Mail</label><br />
        <input
          type="email"
          name="Email"
          id="email"
          required
          placeholder="exemplo@email.com"
        /><br />
        <label for="date">Data de Nascimento</label><br />
        <input type="date" name="Data" id="date" required />
      </fieldset>
      <fieldset>
        <legend>Dados Academicos</legend>
        <label for="Curso">Cursos:</label><br />
        <select name="Curso" id="curso">
          <option value="Outro">Outro</option>
          <option value="ADS">ADS</option>
          <option value="DSM1">DSM1</option></select
        ><br />
        <label for="Periodo"
          >Periodo: <br />
          <input type="radio" name="Periodo" id="Periodo" value="manha" />Manhã
          <input
            type="radio"
            name="Periodo"
            id="Periodo"
            value="noite"
          />Noite </label
        ><br />
        <label for="Obs"
          >Observações: <br />
          <textarea name="Obs" id="Obs"></textarea></label
        ><br />
      </fieldset>
    </form>
  </body>
</html>
