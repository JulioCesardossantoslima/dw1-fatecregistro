<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Pseudo Classes no CSS</title>
  </head>
  <body>
    <h1>Demonstração de Pseudo-classe</h1>
    <h2>:hover - É ativada quando o mouse passa sobre o elementos</h2>
    <div class="caixa">Passe o mouse aqui</div>
    <br />
    <h2>:active - clique no botão</h2>
    <button class="btn-download">Download</button>
    <br />
    <h2>:focus - clique nos campos</h2>
    <form>
      <input type="text" placeholder="clique aqui para focar" />
      <input type="password" placeholder="outro campo com focus" />
    </form>
  </body>
</html>
