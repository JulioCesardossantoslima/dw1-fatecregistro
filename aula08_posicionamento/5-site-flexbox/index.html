<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Café Aroma - Os Melhores Cafés Especiais</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Usando tags semanticas -->
    <header class="header">
      <div class="container">
        <div class="nav">
          <div class="logo">Café Aroma</div>
          <nav class="menu">
            <a href="#home">Início</a>
            <a href="#produtos">Produtos</a>
            <a href="#sobre">Sobre</a>
            <a href="#contato">Contatos</a>
          </nav>
        </div>
      </div>
    </header>
    <!-- Hero Section - onde esta o botao de STA, ele convida o usuario a tomar uma ação/ a parte chamativa -->
     <section class="hero-section">
        <div class="hero-content">
            <h1>Desperte Seus Sentidos</h1>
            <p>Cafés especiais selecionados para você começar o dia com energia e sabor</p>
                    <!-- Botão CTA ( call to action ) -->
         <button class="btn-primary">Conheça Nossos Cafés</button>
        </div>
     </section>
  </body>
</html>
