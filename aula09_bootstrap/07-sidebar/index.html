<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modals</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
</head>
<body>
    <!-- Botao para acionar -->
     <div class="my-4 mx-4">
        <h3>Janela Lateral</h3>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. At, porro. Quasi quod beatae quibusdam corrupti exercitationem nemo vitae magnam porro veniam esse mollitia animi quaerat voluptas possimus, reprehenderit eligendi autem?</p>
        <button type="button" class="btn btn-secondary" data-bs-toggle="offcanvas" data-bs-target="#menu">Abrir</button>
     </div>
     <!-- Janela Lateral -->
      <!-- A janela pode segui - do topo: "offcanvas-top" - da direita: "offcanvas-end" - da esquerda: "offcanvas-start" -->
       <div class="offcanvas offcanvas-end" id="menu">
        <div class="offcanvas-header">
            <h1 class="offcanvas-title">Menu de Opções</h1>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
       </div>
</body>
<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
    integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
    crossorigin="anonymous"
  ></script>
</html>
