<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Introdução ao Bootstrap - Cores</title>
    <!-- Importação do Bootstrap CSS-->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <main>
      <section>
        <h1>Cores no Bootstrap</h1>
        <div>
          <p class="h3 text-muted">Classe text-muted</p>
          <p class="h3 text-primary">Classe text-primary</p>
          <p class="h3 text-succes">Classe text-succes</p>
          <p class="h3 text-info">Classe text-info</p>
          <p class="h3 text-warning">Classe text-warning</p>
          <p class="h3 text-danger">Classe Text-danger</p>
          <p class="h3 text-secondary">Classe text-secundary</p>
        </div>
        <section>
          <h1>Botões no Bootstrap</h1>
          <button type="button" class="btn">Normal</button><br /><br />
          <button type="button" class="btn btn-primary">Primary</button
          ><br /><br />
          <button type="button" class="btn btn-secondary">Secundário</button
          ><br /><br />
          <button type="button" class="btn btn-success">Sucesso</button
          ><br /><br />
          <button type="button" class="btn btn-info">Informação</button
          ><br /><br />
          <button type="button" class="btn btn-warning">Alerta</button
          ><br /><br />
          <button type="button" class="btn btn-danger">Perigo</button
          ><br /><br />
          <button type="button" class="btn btn-dark">Escuro</button><br /><br />
          <button type="button" class="btn btn-light">Claro</button><br /><br />
          <button type="button" class="btn btn-link">Link</button><br /><br />
          <h1>Botões Outline</h1>
          <button type="button" class="btn btn-outline-danger">
            Alerta Outline</button
          ><br /><br />
          <button type="button" class="btn btn-outline-primary">
            Primary Outline</button
          ><br /><br />
          <h1>Botões com Large a Small ( pequeno a maior )</h1>
          <button type="button" class="btn btn-success btn-lg">Enviar</button
          ><br /><br />
          <button type="button" class="btn btn-success btn-md">Enviar</button
          ><br /><br />
          <button type="button" class="btn btn-success btn-sm">Enviar</button
          ><br /><br />
        </section>
      </section>
    </main>
  </body>
  <!-- Importação do Bootsrap do JavaScript -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
    integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
    crossorigin="anonymous"
  ></script>
  <!-- Immportamos scrips embaixo do body para melhorar o desempenho de carregamento da página -->
</html>
