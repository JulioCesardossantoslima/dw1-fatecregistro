<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrousel</title>
     <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
</head>
<body>
    <div class="carousel slide" id="banner" data-bs-ride="carousel">
        <!-- Galeria de imagens -->
         <div class="carousel-inner" id="imagens">
            <!-- Ativo do Carousel -->
             <div class="carousel-item active">
                <!-- primeira imagem -->
                 <img src="https://picsum.photos/id/901/1100/500" class="w-100 d-block">
                 <!-- inserir texto na imagem do carousel -->
                  <div class="carousel-caption">
                    <h2>>Lorem ipsum dolor sit amet, consectetur adipisicing elit.>
                    </div>
             </div>
         
         <!-- Segunda imagem -->
          <div class="carousel-item">
            <img src="https://picsum.photos/id/910/1100/500" class="w-100 d-block">
          </div>
          <!-- Terceira imagem -->
           <div class="carousel-item">
            <img src="https://picsum.photos/id/911/1100/500""  class="w-100 d-block">
           </div>
           </div>
           <!-- Botoes inferiores do carousel -->
           <div class="carousel-indicators" id="indicadores">
            <button type="button" data-bs-target="#banner" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#banner" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#banner" data-bs-slide-to="2"></button>
           </div>
           <!-- Botoes de navegação, esquerdo -->
             <button type="button" data-bs-target="#banner" data-bs-slide="prev" class="carousel-control-prev">
                <span class="carousel-control-prev-icon"></span>
             </button>
             <!-- Botoes de navegação, direito -->
             <button type="button" data-bs-target="#banner" data-bs-slide="next" class="carousel-control-next">
                <span class="carousel-control-next-icon"></span>
             </button>
    </div>
    <!-- botoes do carousel -->
</body>
<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
    integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
    crossorigin="anonymous"
  ></script>
</html>
