<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabela Zebrada</title>
  </head>
  <body>
    <table border="2">
      <caption>
        Tabela de Clientes
      </caption>
      <thead>
        <tr>
          <th colspan="3">Dados pessoais</th>
          <th colspan="2">Endereço</th>
          <th colspan="1">Contato</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <th>Nome:</th>
          <th>Idade:</th>
          <th>Profissão</th>
          <th>Rua:</th>
          <th>Cidade:</th>
          <th>E-Mail:</th>
        </tr>
      </tbody>
    </table>
  </body>
</html>
