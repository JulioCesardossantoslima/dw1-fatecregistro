<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <table border="1">
      <caption>
        Tabela de Dados
      </caption>
      <tr>
        <th>Dados 1</th>
        <th>Dados 2</th>
      </tr>
      <tr>
        <td>Dado 1</td>
        <td>Dado 2</td>
      </tr>
    </table>
    <table border="1">
      <caption>
        Tabela mesclada
      </caption>
      <tr>
        <th>Dados 1</th>
        <th>Dados 2</th>
        <th>Dados 3</th>
      </tr>
      <tr>
        <td rowspan="2">dado 2-2</td>
        <td>dado 1-2</td>
        <td>dado 1-3</td>
      </tr>
      <tr>
        <td>dado 2-1</td>
        <td>dado 2-2</td>
      </tr>
      <tr>
        <td colspan="2">dado 3-1</td>
        <td>dado 3-3</td>
      </tr>
    </table>
  </body>
</html>
